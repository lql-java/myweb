<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>动画网页</title>
		<style type="text/css">
			*{
				margin: 0;
				padding: 0;
			}
			body{
				background: black;
			}
			.magic{
				transform-style: preserve-3d;
				animation: rotate 60s linear infinite;
			}
			@keyframes rotate{
				50%{
					transform-origin: center center;
					transform: rotateY(3600deg) rotateX(3600deg);
				}
			}
			.magic_a{
				margin: 300px;
				transform: translateZ(-150px);
			}
			.magic_b{
				transform: rotateY(90deg) translateX(150px);
				transform-origin: right;
				position: absolute;
				top: 300px;
				left: 0;
			}
			.magic_c{
				transform: rotateY(270deg) translateX(-150px);
				transform-origin: left;
				position: absolute;
				top: 300px;
				left: 600px;
			}
			.magic_d{
				position: absolute;
				transform:translateZ(150px);
				top: 300px;
				left: 300px;
			}
			.magic_e{
				transform: rotateX(270deg) translateX(-150px) translateY(150px);
				transform-origin: bottom;
				position: absolute;
				top: 0px;
				left: 450px;
			}
			.magic_f{
				transform: rotateX(90deg) translateZ(-150px) translateY(-150px);
				transform-origin: top;
				position: absolute;
				top: 450px;
				left: 300px;
			}
			.botten {
				
				padding: 10px 0px;
				background: #004956;
				text-align: center;
				color: #FFFFFF;
				font-size: 12px;
				font-family: "宋体";
			}
		</style>
	</head>
	<body>
		<div class="magic">
			<img class="magic_a" src="images/photo.png" alt="" />
			<img class="magic_b" src="images/photo.png" alt="" />
			<img class="magic_c" src="images/photo.png" alt="" />
			<img class="magic_d" src="images/photo.png" alt="" />
			<img class="magic_e" src="images/photo.png" alt="" />
			<img class="magic_f" src="images/photo.png" alt="" />
		</div>
		<div class="botten">
			<span>专业：移动应用开发</span>
			<span>班级：2班</span>
			<span>学号：250403059</span>

			<span>联系方式：15572402675</span>
			<span>邮箱：liqinglin20021.outlook.com</span>
		</div>
	</body>
</html>
