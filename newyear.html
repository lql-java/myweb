<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨年倒计时 | 喜迎新年</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        /* 页面整体样式 */
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #0c1445, #1f0f4e, #2e0a5e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            transition: all 0.5s ease;
        }

        /* 实时时间样式 */
        .current-time {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #e0e7ff;
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
        }

        /* 倒计时容器样式 */
        .countdown-container {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        /* 倒计时数字卡片样式 */
        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 140px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .countdown-number {
            font-size: 4.5rem;
            font-weight: bold;
            color: #f0e68c;
            text-shadow: 0 0 15px rgba(240, 230, 140, 0.8);
            margin-bottom: 0.5rem;
        }

        .countdown-label {
            font-size: 1.2rem;
            color: #d1d5db;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 新年提示文本 */
        .new-year-tip {
            font-size: 1.8rem;
            color: #a78bfa;
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.8);
            margin-bottom: 2rem;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        /* 零点祝福弹窗（默认隐藏） */
        .blessing-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in-out;
        }

        /* 祝福弹窗激活状态 */
        .blessing-modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .blessing-title {
            font-size: 5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
            animation: bounce 2s infinite;
        }

        .blessing-desc {
            font-size: 2rem;
            color: #fff;
            text-align: center;
            margin-bottom: 3rem;
            max-width: 80%;
        }

        .replay-btn {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            background: #fff;
            color: #ff4e50;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .replay-btn:hover {
            background: #f8f8f8;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        /* 烟花动画（通过JS动态生成） */
        .firework {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            opacity: 0;
            animation: fireworkBurst 2s ease-in-out infinite;
        }

        /* 动画关键帧 */
        @keyframes fireworkBurst {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .current-time {
                font-size: 1.5rem;
            }

            .countdown-container {
                gap: 1rem;
            }

            .countdown-item {
                width: 80px;
                height: 100px;
            }

            .countdown-number {
                font-size: 3rem;
            }

            .countdown-label {
                font-size: 0.9rem;
            }

            .new-year-tip {
                font-size: 1.5rem;
            }

            .blessing-title {
                font-size: 3rem;
            }

            .blessing-desc {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .countdown-container {
                gap: 0.5rem;
            }

            .countdown-item {
                width: 60px;
                height: 80px;
            }

            .countdown-number {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 实时时间显示 -->
    <div class="current-time" id="currentTime"></div>

    <!-- 倒计时容器 -->
    <div class="countdown-container">
        <div class="countdown-item">
            <div class="countdown-number" id="days">00</div>
            <div class="countdown-label">天</div>
        </div>
        <div class="countdown-item">
            <div class="countdown-number" id="hours">00</div>
            <div class="countdown-label">时</div>
        </div>
        <div class="countdown-item">
            <div class="countdown-number" id="minutes">00</div>
            <div class="countdown-label">分</div>
        </div>
        <div class="countdown-item">
            <div class="countdown-number" id="seconds">00</div>
            <div class="countdown-label">秒</div>
        </div>
    </div>

    <!-- 新年提示 -->
    <div class="new-year-tip" id="newYearTip">即将迎来 2026 年！</div>

    <!-- 零点祝福弹窗 -->
    <div class="blessing-modal" id="blessingModal">
        <h1 class="blessing-title">新年快乐！</h1>
        <p class="blessing-desc">愿你新的一年，万事顺意，平安喜乐，财源滚滚，美梦成真！</p>
        <button class="replay-btn" id="replayBtn">重新体验</button>
    </div>

    <script>
        // 获取DOM元素
        const currentTimeEl = document.getElementById('currentTime');
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const newYearTipEl = document.getElementById('newYearTip');
        const blessingModalEl = document.getElementById('blessingModal');
        const replayBtnEl = document.getElementById('replayBtn');

        // 定义跨年目标时间（2026年1月1日 00:00:00）
        let targetYear = new Date().getFullYear() + 1;
        let targetDate = new Date(`${targetYear}-01-01 00:00:00`);
        let isNewYear = false; // 标记是否已进入新年

        // 更新实时时间
        function updateCurrentTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const date = now.getDate().toString().padStart(2, '0');
            currentTimeEl.textContent = `${year}-${month}-${date} ${hours}:${minutes}:${seconds}`;
        }

        // 计算并更新倒计时
        function updateCountdown() {
            if (isNewYear) return; // 已进入新年，停止倒计时更新

            const now = new Date();
            const timeDiff = targetDate - now; // 剩余时间（毫秒）

            // 若时间差小于等于0，说明已到新年
            if (timeDiff <= 0) {
                triggerNewYearBlessing();
                return;
            }

            // 计算天、时、分、秒
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

            // 更新DOM显示（补零）
            daysEl.textContent = days.toString().padStart(2, '0');
            hoursEl.textContent = hours.toString().padStart(2, '0');
            minutesEl.textContent = minutes.toString().padStart(2, '0');
            secondsEl.textContent = seconds.toString().padStart(2, '0');

            // 更新新年提示文本
            newYearTipEl.textContent = `即将迎来 ${targetYear} 年！`;
        }

        // 触发新年祝福（零点特效）
        function triggerNewYearBlessing() {
            isNewYear = true;
            // 隐藏倒计时相关元素
            currentTimeEl.style.opacity = 0;
            document.querySelector('.countdown-container').style.opacity = 0;
            newYearTipEl.style.opacity = 0;
            // 激活祝福弹窗
            blessingModalEl.classList.add('active');
            // 生成烟花动画
            createFireworks();
        }

        // 生成烟花
        function createFireworks() {
            const modal = document.getElementById('blessingModal');
            const fireworkCount = 50; // 烟花数量

            // 清除已有烟花
            const existingFireworks = document.querySelectorAll('.firework');
            existingFireworks.forEach(fw => fw.remove());

            for (let i = 0; i < fireworkCount; i++) {
                const firework = document.createElement('div');
                firework.classList.add('firework');

                // 随机颜色
                const color = `rgb(${Math.random() * 255}, ${Math.random() * 255}, ${Math.random() * 255})`;
                firework.style.background = color;

                // 随机位置（基于视口）
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                firework.style.left = `${x}px`;
                firework.style.top = `${y}px`;

                // 随机爆炸方向和距离
                const tx = (Math.random() - 0.5) * 200;
                const ty = (Math.random() - 0.5) * 200;
                firework.style.setProperty('--tx', `${tx}px`);
                firework.style.setProperty('--ty', `${ty}px`);

                // 随机动画延迟
                firework.style.animationDelay = `${Math.random() * 2}s`;

                modal.appendChild(firework);
            }
        }

        // 重新体验按钮点击事件
        replayBtnEl.addEventListener('click', function() {
            // 重置状态
            isNewYear = false;
            // 恢复元素显示
            currentTimeEl.style.opacity = 1;
            document.querySelector('.countdown-container').style.opacity = 1;
            newYearTipEl.style.opacity = 1;
            // 隐藏祝福弹窗
            blessingModalEl.classList.remove('active');
            // 重新计算目标时间
            targetYear = new Date().getFullYear() + 1;
            targetDate = new Date(`${targetYear}-01-01 00:00:00`);
            // 立即更新倒计时
            updateCountdown();
        });

        // 初始化
        function init() {
            // 立即更新时间和倒计时
            updateCurrentTime();
            updateCountdown();
            // 每秒更新一次
            setInterval(() => {
                updateCurrentTime();
                updateCountdown();
            }, 1000);
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
